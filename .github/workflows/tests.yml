name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: "Tests · Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[test]"
      - run: flake8 fx_holiday_calculator scripts tests --max-line-length=120
      - run: black --check fx_holiday_calculator scripts tests
      - run: isort --check fx_holiday_calculator scripts tests
      - run: pytest -v
      - name: Streamlit smoke test
        run: |
          streamlit run --server.headless true --server.port 8765 run_ui.py &
          STREAMLIT_PID=$!
          sleep 5
          curl --silent http://localhost:8765 > /dev/null
          kill $STREAMLIT_PID
